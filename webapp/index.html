<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Музыкальный плеер</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <button class="menu-toggle" id="menu-toggle">☰</button>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-headphones"></i> MusicForYou
            </div>
            <nav>
                <ul id="playlist-nav"></ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="playlist-header">
                <img id="playlist-cover" src="images/default_playlist.jpg" alt="Playlist cover">
                <div class="playlist-info">
                    <h1 id="playlist-title">Название плейлиста</h1>
                    <p id="playlist-description">Плейлист, созданный специально для тебя</p>
                    <button id="shuffle-btn" class="shuffle-btn">
                        <i class="fas fa-random"></i> Случайный трек
                    </button>
                </div>
            </div>
            <div class="track-list" id="track-list"></div>
        </main>

        <footer class="player-bar">
            <div class="track-info-mini">
                <img id="current-cover" src="images/default_track.jpg" alt="cover" style="cursor: pointer;">
                <div>
                    <div id="current-track-name">Не выбрано</div>
                    <div id="current-artist"></div>
                </div>
            </div>
            <div class="player-controls">
                <button id="repeat"><i class="fas fa-redo-alt"></i></button>
                <button id="prev"><i class="fas fa-step-backward"></i></button>
                <button id="play-pause"><i class="fas fa-play"></i></button>
                <button id="next"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="progress-area">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" value="0" step="0.1">
                <span id="duration">0:00</span>
            </div>
            <div class="volume-area">
                <i class="fas fa-volume-up" id="volume-icon"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
            </div>
        </footer>
    </div>

    <audio id="audio" preload="auto"></audio>

    <!-- Полноэкранный оверлей для трека -->
    <div id="fullscreen-overlay" class="fullscreen-overlay">
        <div class="fullscreen-content">
            <button id="close-fullscreen" class="close-fullscreen">&times;</button>
            <img id="fullscreen-cover" src="" alt="cover">
            <div class="fullscreen-info">
                <div id="fullscreen-track-name"></div>
                <div id="fullscreen-artist"></div>
            </div>
            <div class="fullscreen-controls">
                <button id="fullscreen-repeat"><i class="fas fa-redo-alt"></i></button>
                <button id="fullscreen-prev"><i class="fas fa-step-backward"></i></button>
                <button id="fullscreen-play-pause"><i class="fas fa-play"></i></button>
                <button id="fullscreen-next"><i class="fas fa-step-forward"></i></button>
                <button id="fullscreen-shuffle"><i class="fas fa-random"></i></button>
            </div>
            <div class="fullscreen-progress-area">
                <span id="fullscreen-current-time">0:00</span>
                <input type="range" id="fullscreen-progress" value="0" step="0.1">
                <span id="fullscreen-duration">0:00</span>
            </div>
            <div class="fullscreen-volume-area">
                <i class="fas fa-volume-up" id="fullscreen-volume-icon"></i>
                <input type="range" id="fullscreen-volume" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
